<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knit City Toronto 2026 — Vendor Directory</title>
  <meta name="description" content="Complete list of vendors attending Knit City Toronto 2026 — browse yarn companies, indie dyers, notions makers, and publishers with links to their websites and social profiles." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-inner">
      <p class="header-eyebrow">🧶 Fibre Arts Festival</p>
      <h1>Knit City <span>Toronto 2026</span></h1>
      <h2 style="font-size:1.1rem;font-weight:400;opacity:.85;margin-bottom:.25rem;">Vendor Directory</h2>
      <div class="header-meta">
        <span>
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          2026
        </span>
        <span>
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Toronto, ON
        </span>
        <span>
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="vendor-count-header">24</span> Vendors
        </span>
      </div>
      <div class="page-nav-links">
        <a href="shopify-products.html" class="btn-secondary">View Shopify Top Products →</a>
      </div>
    </div>
  </header>

  <!-- ===== TOOLBAR ===== -->
  <div class="toolbar" role="search">
    <div class="toolbar-inner">
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input
          type="search"
          id="search"
          placeholder="Search vendors…"
          aria-label="Search vendors"
          autocomplete="off"
        />
      </div>

      <div class="filter-wrap">
        <span class="filter-label">Category:</span>
        <select id="category-filter" aria-label="Filter by category">
          <option value="">All categories</option>
        </select>
      </div>

      <span class="results-count" id="results-count" aria-live="polite"></span>
    </div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <main>
    <div class="vendor-grid" id="vendor-grid" role="list"></div>

    <div class="empty-state" id="empty-state" role="status">
      <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <h2>No vendors found</h2>
      <p>Try a different search term or category.</p>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>
      Knit City Toronto 2026 Vendor Directory &mdash;
      For the official event site visit
      <a href="https://knitcity.ca" target="_blank" rel="noopener noreferrer">knitcity.ca</a>
    </p>
  </footer>

  <script src="vendors.js"></script>
  <script>
    /* ---- SVG icons ---- */
    const ICONS = {
      instagram: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>`,
      facebook:  `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`,
      ravelry:   `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm3.19 17.674a5.446 5.446 0 0 1-2.062.407c-1.244 0-2.286-.37-3.054-1.068-.832-.753-1.267-1.853-1.267-3.177 0-1.297.428-2.374 1.237-3.113.74-.675 1.77-1.03 2.99-1.03.626 0 1.196.107 1.654.307l-.317 1.074a3.63 3.63 0 0 0-1.337-.245c-.77 0-1.387.245-1.82.708-.5.529-.749 1.32-.749 2.299 0 .938.24 1.701.715 2.213.43.462 1.046.706 1.778.706.508 0 1.03-.108 1.487-.308l.258 1.05-.509.177zm2.516.204h-1.244V6.274h1.244v11.604z"/></svg>`,
      twitter:   `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,
      shopify:   `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M15.68 5.65c-.01-.06-.05-.12-.1-.16-.05-.04-.12-.06-.18-.06h-.01c-.04 0-.82-.05-2.1-.09-.08-.24-.18-.52-.3-.8-.35-.83-.85-1.58-1.54-1.58h-.07c-.2-.27-.45-.4-.74-.4-2.25 0-3.32 2.82-3.66 4.25-1 .31-1.71.53-1.8.56-.56.18-.58.2-.65.73-.05.4-1.52 11.73-1.52 11.73l11.23 2.1 6.09-1.31s-4.26-14.9-4.65-16.97zm-4.55-1.22c.21 0 .43.28.63.79-.42.13-.88.27-1.36.42.19-.72.47-1.21.73-1.21zm-.87-.38c-.41.57-.72 1.48-.92 2.5-.38.12-.74.23-1.08.34.3-1.01.9-2.42 2-2.84zm-3.04 7.95 1.38-.43c.09-.59.35-2.23 1.64-2.23.99 0 1.47.62 1.47 1.46 0 1.64-.85 2.77-2 2.77-.62 0-.97-.47-.97-.47l-.91 3.39-2.1-.65 1.49-3.84zm5.04-5.5c0-.06-.01-.14-.01-.22 0-.48-.07-.86-.18-1.15.62.08 1.04.12 1.04.12s-.17.52-.45 1.25l-.4.12v-.12zm1.09 10.18-3.88-1.16.75-2.58s.43.33 1.18.33c2.39 0 3.96-2.9 3.96-5.8 0-.94-.35-1.67-.84-2.14.39-.12.63-.2.63-.2l2.2 8.47-4 1.08z"/></svg>`
    };

    const SOCIAL_LABELS = {
      instagram: 'Instagram',
      facebook:  'Facebook',
      ravelry:   'Ravelry',
      twitter:   'Twitter / X'
    };

    function categoryClass(category) {
      return 'cat-' + category.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
    }

    function buildCategoryFilter() {
      const select = document.getElementById('category-filter');
      const cats = [...new Set(vendors.map(v => v.category))].sort();
      cats.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
      });
    }

    function renderVendors(list) {
      const grid = document.getElementById('vendor-grid');
      const empty = document.getElementById('empty-state');
      const countEl = document.getElementById('results-count');

      grid.innerHTML = '';

      if (list.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        countEl.textContent = '0 results';
        return;
      }

      grid.style.display = '';
      empty.style.display = 'none';
      countEl.textContent = `${list.length} vendor${list.length === 1 ? '' : 's'}`;

      list.forEach(vendor => {
        const card = document.createElement('article');
        card.className = 'vendor-card';
        card.setAttribute('role', 'listitem');
        const shopifyBadge = vendor.isShopify
          ? `<span class="vendor-badge vendor-badge-shopify" title="Runs on Shopify" aria-label="Runs on Shopify">${ICONS.shopify}<span>Shopify</span></span>`
          : '';

        const socialHTML = Object.entries(vendor.social || {})
          .map(([platform, url]) => {
            const icon = ICONS[platform] || '';
            const label = SOCIAL_LABELS[platform] || platform;
            return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="${vendor.name} on ${label}" title="${label}">${icon}</a>`;
          })
          .join('');

        card.innerHTML = `
          <div class="card-top">
            <h2 class="vendor-name">${escapeHtml(vendor.name)}</h2>
            <div class="card-meta">
              ${shopifyBadge}
              <span class="vendor-category ${categoryClass(vendor.category)}">${escapeHtml(vendor.category)}</span>
            </div>
          </div>
          <p class="vendor-description">${escapeHtml(vendor.description)}</p>
          <div class="card-footer">
            <a href="${vendor.website}" target="_blank" rel="noopener noreferrer" class="btn-website">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              Visit website
            </a>
            ${socialHTML ? `<div class="social-links">${socialHTML}</div>` : ''}
          </div>
        `;

        grid.appendChild(card);
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function filterVendors() {
      const query = document.getElementById('search').value.trim().toLowerCase();
      const category = document.getElementById('category-filter').value;

      const filtered = vendors.filter(v => {
        const matchesCategory = !category || v.category === category;
        const matchesQuery = !query ||
          v.name.toLowerCase().includes(query) ||
          v.description.toLowerCase().includes(query) ||
          v.category.toLowerCase().includes(query);
        return matchesCategory && matchesQuery;
      });

      renderVendors(filtered);
    }

    /* ---- Init ---- */
    document.getElementById('vendor-count-header').textContent = vendors.length;
    buildCategoryFilter();
    renderVendors(vendors);

    document.getElementById('search').addEventListener('input', filterVendors);
    document.getElementById('category-filter').addEventListener('change', filterVendors);
  </script>
</body>
</html>
